<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azim Premji University Portal</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.logo {
    font-weight: bold;
    font-size: 18px;
    color: #0070d2;
}

.nav-links {
    display: flex;
    gap: 25px;
}

.nav-links div {
    cursor: pointer;
    position: relative;
}

/* DROPDOWN */
.dropdown-content {
    display: none;
    position: absolute;
    top: 30px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    padding: 10px;
    width: 220px;
}

.dropdown-content p {
    margin: 10px 0;
}

.nav-links div:hover .dropdown-content {
    display: block;
}

/* HERO SECTION */
.hero {
    height: 80vh;
    background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1') no-repeat center/cover;
    display: flex;
    align-items: center;
    padding-left: 60px;
    color: white;
}

.hero-content {
    max-width: 500px;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

.btn {
    background: orange;
    padding: 12px 25px;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
}

/* SECTION */
.section {
    padding: 50px;
    text-align: center;
}

footer {
    background: #0070d2;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

<script>
function initEmbeddedMessaging() {
    try {
        embeddedservice_bootstrap.settings.language = 'en_US';

        embeddedservice_bootstrap.init(
            '00DgK000004AM8D',
            'Agent_deployment',
            'https://orgfarm-15424e14d8-dev-ed.develop.my.site.com/ESWAgentdeployment1752820471517',
            {
                scrt2URL: 'https://orgfarm-15424e14d8-dev-ed.develop.my.salesforce-scrt.com'
            }
        );
    } catch (err) {
        console.error('Error loading Embedded Messaging: ', err);
    }
}

window.addEventListener("onEmbeddedMessagingReady", e => {
    embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
        "Building_Name": "Gotham Point"
    });
});
</script>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">My University</div>

    <div class="nav-links">
        <div>About Us</div>

        <div>
            Programmes & Admissions
            <div class="dropdown-content">
                <p>UG Admissions</p>
                <p>PG Admissions</p>
                <p>Diplomas</p>
                <p>Professional Courses</p>
            </div>
        </div>

        <div>Research</div>
        <div>Campus Life</div>
        <div>Resources</div>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>Inviting Applications</h1>
        <button class="btn">Apply Now</button>
    </div>
</div>

<!-- SECTION -->
<div class="section">
    <h2>Welcome to Our University</h2>
    <p>Explore programs, campus life, and opportunities.</p>
</div>

<footer>
    © 2025 University Portal
</footer>

<!-- CHATBOT SCRIPT -->
<script src='https://orgfarm-15424e14d8-dev-ed.develop.my.site.com/ESWAgentdeployment1752820471517/assets/js/bootstrap.min.js'
onload='initEmbeddedMessaging()'></script>

</body>
</html>
